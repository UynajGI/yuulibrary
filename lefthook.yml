# Yuunagi Library — lefthook git hooks
# Install: lefthook install

pre-commit:
  parallel: true
  jobs:
    - name: trailing-whitespace
      glob: "*.{md,yml,yaml,css,js}"
      run: |
        git diff --cached --name-only --diff-filter=ACM | grep -E '\.(md|yml|yaml|css|js)$' | xargs -r sed -i 's/[[:space:]]*$//'
    - name: mkdocs-build
      glob: "*.{md,yml,css,js}"
      run: mkdocs build --strict 2>&1 | grep -v "MkDocs 2.0\|squidfunk\|unlicensed\|No migration\|Closed contribution\|All plugins\|All theme"
