# Yuunagi Library — lefthook git hooks
# Install:
#   lefthook install
#
# Manual check:
#   lefthook validate
#   lefthook run pre-commit
#   lefthook run pre-push

pre-commit:
  parallel: false
  jobs:
    - name: trailing-whitespace
      glob:
        - "**/*.md"
        - "**/*.yml"
        - "**/*.yaml"
        - "**/*.css"
        - "**/*.scss"
        - "**/*.js"
        - "**/*.toml"
      run: |
        python3 - <<'PY'
        from pathlib import Path
        import subprocess

        exts = {".md", ".yml", ".yaml", ".css", ".scss", ".js", ".toml"}

        result = subprocess.run(
            ["git", "diff", "--cached", "--name-only", "--diff-filter=ACMR"],
            check=True,
            text=True,
            capture_output=True,
        )

        changed = []
        for name in result.stdout.splitlines():
            path = Path(name)
            if path.suffix not in exts or not path.exists() or not path.is_file():
                continue

            original = path.read_bytes()

            try:
                text = original.decode("utf-8")
            except UnicodeDecodeError:
                continue

            fixed = "\n".join(line.rstrip() for line in text.splitlines())

            if text.endswith("\n"):
                fixed += "\n"

            data = fixed.encode("utf-8")
            if data != original:
                path.write_bytes(data)
                changed.append(str(path))

        if changed:
            subprocess.run(["git", "add", *changed], check=True)
            print("Trimmed trailing whitespace:")
            for item in changed:
                print(f"  {item}")
        PY

    - name: prettier
      glob:
        - "**/*.js"
        - "**/*.css"
      run: |
        npx -y prettier --write {staged_files}
        git add {staged_files}

    - name: eslint
      glob:
        - "**/*.js"
      run: npm exec -y --package=eslint@8 -- eslint --config .eslintrc.json --no-error-on-unmatched-pattern {staged_files}

    - name: css-check
      glob:
        - "**/*.css"
        - "**/*.scss"
      run: |
        python3 - <<'PY'
        import subprocess, sys, os

        out = subprocess.run(
            ["git", "diff", "--cached", "--name-only", "--diff-filter=ACMR"],
            check=True, text=True, capture_output=True,
        )
        errors = []
        for name in out.stdout.splitlines():
            if not name.endswith((".css", ".scss")): continue
            if not os.path.exists(name): continue
            content = open(name).read()
            lines = content.split("\n")
            depth = 0
            for i, line in enumerate(lines, 1):
                depth += line.count("{") - line.count("}")
                if depth < 0:
                    errors.append(f"{name}:{i}: unbalanced closing brace")
                    depth = 0
                # Flag empty rules: line ends with {} or line has { followed by next non-empty line starting with }
                if line.rstrip().endswith("{}"):
                    errors.append(f"{name}:{i}: empty rule block")
            if depth != 0:
                errors.append(f"{name}: unbalanced braces (depth={depth})")
        if errors:
            print("CSS ERRORS:")
            for e in errors: print(f"  {e}")
            sys.exit(1)
        print("CSS OK")
        PY

    - name: hugo-build-check
      run: hugo --gc --minify
      glob:
        - "content/**/*.md"
        - "layouts/**/*.html"
        - "static/chat/**"
        - "hugo.toml"
        - "assets/**"
        - "lefthook.yml"

    - name: pageindex-build
      glob:
        - "content/**/*.md"
      run: python3 scripts/build_pageindex.py --incremental

    - name: markdownlint
      glob:
        - "content/**/*.md"
      run: npm exec -y --package=markdownlint-cli -- markdownlint {staged_files}

    - name: image-refs
      glob:
        - "content/**/*.md"
      run: |
        python3 -c "
        import os, sys, re, subprocess
        root = os.getcwd()
        out = subprocess.run(['git','diff','--cached','--name-only','--diff-filter=ACMR'],
                             capture_output=True, text=True).stdout
        errors = []
        for name in out.splitlines():
            if not name.endswith('.md'): continue
            if not name.startswith('content/'): continue
            path = os.path.join(root, name)
            if not os.path.exists(path): continue
            content = open(path).read()
            for m in re.finditer(r'!\[.*?\]\(([^)]+)\)', content):
                ref = m.group(1)
                if '://' in ref: continue
                target = os.path.normpath(os.path.join(os.path.dirname(path), ref))
                if not os.path.exists(target):
                    ln = content[:m.start()].count('\n') + 1
                    errors.append(f'{name}:{ln}: missing image {ref}')
        if errors:
            print('MISSING IMAGES:')
            for e in errors: print(f'  {e}')
            sys.exit(1)
        print('Image refs OK')
        "

    - name: front-matter
      glob:
        - "content/**/_index.md"
      run: |
        python3 -c "
        import os, sys, re, subprocess
        root = os.getcwd()
        out = subprocess.run(['git','diff','--cached','--name-only','--diff-filter=ACMR'],
                             capture_output=True, text=True).stdout
        errors = []
        for name in out.splitlines():
            if not name.endswith('.md'): continue
            if not name.startswith('content/'): continue
            path = os.path.join(root, name)
            if not os.path.exists(path): continue
            content = open(path).read()
            m = re.match(r'^---\s*\n(.*?)\n---', content, re.DOTALL)
            if not m: continue
            keys = set(re.findall(r'^(\w+):', m.group(1), re.MULTILINE))
            missing = {'title', 'weight'} - keys
            if missing:
                errors.append('{}: missing {}'.format(name, ', '.join(sorted(missing))))
        if errors:
            print('MISSING FRONT MATTER:')
            for e in errors: print(f'  {e}')
            sys.exit(1)
        print('Front matter OK')
        "

    - name: book-validate
      glob:
        - "content/books/**/*.md"
      run: python3 .claude/skills/add-book-to-library/scripts/validate_book.py content/books/

    - name: paper-validate
      glob:
        - "content/papers/**/*.md"
      run: python3 .claude/skills/add-book-to-library/scripts/validate_book.py content/papers/

    - name: latex-render
      glob:
        - "content/**/*.md"
      run: python3 scripts/check_latex_render.py

pre-push:
  jobs:
    - name: hugo-build
      run: hugo --gc --minify

    - name: html-check
      run: |
        python3 - <<'PY'
        import os, sys, re
        public = 'public'
        errors, warnings = [], []

        for page in ['index.html', 'papers/index.html']:
            p = os.path.join(public, page)
            if not os.path.exists(p):
                errors.append(f"missing key page: {page}")

        for section in ['papers', 'books']:
            for d in sorted(os.listdir(f'content/{section}')):
                src = os.path.join(f'content/{section}', d, '_index.md')
                if not os.path.exists(src): continue
                html = os.path.join(public, section, d, 'index.html')
                if not os.path.exists(html):
                    errors.append(f"not generated: {section}/{d}/ (date in future?)")

        # Broken links = warning only (tags taxonomy false positives)
        for root, dirs, files in os.walk(public):
            for fn in files:
                if not fn.endswith('.html'): continue
                path = os.path.join(root, fn)
                content = open(path, 'rb').read().decode('utf-8', errors='replace')
                hrefs = re.findall(r'href="(/[^"]*\.html)"', content)
                for href in hrefs:
                    t = os.path.normpath(os.path.join(public, href.lstrip('/')))
                    alt = os.path.normpath(os.path.join(public, href.replace('/yuulibrary/', '', 1).lstrip('/')))
                    if not os.path.exists(t) and not os.path.exists(alt):
                        warnings.append(f"{os.path.relpath(path,public)}: {href}")

        if errors:
            print(f"HTML ERRORS ({len(errors)}):")
            for e in errors: print(f"  {e}")
            sys.exit(1)
        if warnings:
            print(f"HTML WARNINGS ({len(warnings)}):")
            for w in warnings[:10]: print(f"  {w}")
        print("HTML check OK")
        PY
