name: PageIndex Summary

# 监听 content/ 改动 → 增量生成 LLM summary → commit 回 main
# 用户需在 repo secrets 配任一 API key + LLM_MODEL（litellm 格式）
# 例如：DEEPSEEK_API_KEY + LLM_MODEL=deepseek/deepseek-chat

on:
  push:
    branches: [main]
    paths:
      - 'content/**/*.md'

permissions:
  contents: write  # 允许 commit 回 main

concurrency:
  group: pageindex-summary
  cancel-in-progress: false  # 不取消正在跑的，避免索引冲突

jobs:
  build-summary:
    runs-on: ubuntu-latest
    # 没配任何 API key 时跳过（只做结构化，不生成 LLM summary）
    if: ${{ secrets.LLM_MODEL != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 需要完整历史做 fingerprint 增量

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install litellm pyyaml

      - name: Generate summaries (incremental)
        env:
          # litellm 按环境变量自动路由到对应 provider
          # 用户只需配实际使用的那一家
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          echo "Using model: $LLM_MODEL"
          python3 scripts/build_pageindex.py --incremental

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/pageindex/
          if git diff --staged --quiet; then
            echo "No index changes, skipping commit."
          else
            git commit -m "[bot] pageindex: summary 更新

          生成 by GitHub Action (model: ${{ secrets.LLM_MODEL }})"
            git push
            echo "✓ Pushed index update."
          fi
