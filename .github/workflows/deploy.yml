# GitHub Actions workflow: deploy Hugo site to GitHub Pages
name: Deploy Book Site
# 只在打 tag（YYYY.MM.DD.NN 日期序列，如 2026.07.07.01）时部署；
# 平时 push 到 main 不触发 CI，随便 push 不撞车。手动跑用 workflow_dispatch
#
# 注意：on.push.tags 用 glob 语法（fnmatch），不是正则。
# '20[0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9]*' 明确匹配日期序列 tag。
on:
  push:
    tags:
      - '20[0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

# 多个 tag 连发时排队执行（不取消进行中的部署，避免 gh-pages 半推）
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # Hugo Book 主题（git submodule）
          fetch-depth: 0    # enableGitInfo 需要 git 历史

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.3'
          extended: true

      - name: Validate books + papers
        run: |
          python3 .claude/skills/add-book-to-library/scripts/validate_book.py content/books/
          python3 .claude/skills/add-book-to-library/scripts/validate_book.py content/papers/

      - name: Translate-chapters regression tests
        run: python3 .claude/skills/add-book-to-library/scripts/test_translate.py

      - name: Build PageIndex (incremental)
        env:
          # litellm 多 provider 路由：配任一 key + LLM_MODEL 即可生成 LLM summary
          # 未配置时 summary 退化为 text 前 200 字截断（仍可用，只是不是真摘要）
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || secrets.LLM_MODEL }}
        run: |
          pip install pyyaml
          if [ -n "$LLM_MODEL" ]; then
            pip install litellm
            echo "Building PageIndex with LLM summary (model: $LLM_MODEL)..."
          else
            echo "Building PageIndex (no LLM, summary=truncated fallback)..."
          fi
          # 增量：pageindex JSON + fingerprints 都在 git 里，CI checkout 就有
          # 只处理 fingerprints 变了的文档，其余 JSON 保持不动
          python3 scripts/build_pageindex.py --incremental

      - name: Build
        run: hugo --gc --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
