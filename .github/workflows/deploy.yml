# GitHub Actions workflow: deploy Hugo site to GitHub Pages
name: Deploy Book Site
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # Hugo Book 主题（git submodule）
          fetch-depth: 0    # enableGitInfo 需要 git 历史

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.3'
          extended: true

      - name: Validate books + papers
        run: |
          python3 .claude/skills/add-book-to-library/scripts/validate_book.py content/books/
          python3 .claude/skills/add-book-to-library/scripts/validate_book.py content/papers/

      - name: Build PageIndex
        run: |
          pip install pyyaml
          python3 scripts/build_pageindex.py

      - name: Build
        run: hugo --gc --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
