name: ✨ 功能建议
description: 建议一个新功能或改进
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解决什么问题
      description: 这个功能解决什么痛点?当前怎么做?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的方案
      description: 你希望怎么解决?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
    validations:
      required: false
