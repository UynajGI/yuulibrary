name: 🐛 Bug 报告
description: 报告一个问题
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 发生了什么?预期是什么?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 怎么触发这个 bug?
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 看到 ...
    validations:
      required: true

  - type: input
    id: hugo-version
    attributes:
      label: Hugo 版本
      placeholder: "0.163.3"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志 / 截图
      render: shell
    validations:
      required: false
