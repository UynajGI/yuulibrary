# Yuunagi Library — Hugo configuration
# 基于 Hugo Book 主题的多书站点

baseURL = 'https://uynajgi.github.io/yuulibrary/'
title = 'Yuunagi Library'
theme = 'hugo-book'

enableGitInfo = true
disablePathToLower = true

# 保持与原 mkdocs `use_directory_urls: false` 一致：ch01.html 而非 ch01/
uglyurls = true

# GitHub Pages project site: base URL 含子路径，资源需相对根
relativeurls = false

copyright = '© Yuunagi'

# 渲染：raw HTML（solution/caption/表格）透传，数学公式 passthrough
[markup]
[markup.goldmark.renderer]
  unsafe = true
[markup.goldmark.extensions]
  typographer = false
[markup.goldmark.extensions.passthrough]
  enable = true
[markup.goldmark.extensions.passthrough.delimiters]
  block = [['$$', '$$']]
  inline = [['$', '$']]
[markup.tableOfContents]
  startLevel = 2
  endLevel = 4
  ordered = false
[markup.highlight]
  style = 'github'
  lineNos = false
  noClasses = false

# 输出：首页 RSS，其余只要 HTML
[outputs]
  home = ['html', 'rss']

# 分类法：标签 + 分类
[taxonomies]
  tag = 'tags'
  category = 'categories'

# 语言：单语言站（中文），内容放在 content/ 而非 content.zh/
[languages.zh]
  label = '中文'
  locale = 'zh-CN'
  weight = 1

# 站点参数（Hugo Book）
[params]
  BookTheme = 'light'  # 主题只编译浅色版；深色由 <html data-effective-theme="dark"> 运行时切换
  BookSection = '*'
  BookSearch = true
  BookComments = false
  BookDateFormat = '2006-01-02'
  BookRepo = 'https://github.com/uynajgi/yuulibrary'
  BookContentBranch = 'personal'  # chat agent 从此分支 fetch 正文（personal=完整内容）
  BookPortableLinks = 'warning'

