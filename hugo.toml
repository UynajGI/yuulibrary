# Yuunagi Library — Hugo configuration
# 基于 Hugo Book 主题的多书站点

baseURL = 'https://uynajgi.github.io/yuulibrary/'
title = 'Yuunagi Library'
theme = 'hugo-book'

enableGitInfo = true
disablePathToLower = true

# 保持与原 mkdocs `use_directory_urls: false` 一致：ch01.html 而非 ch01/
uglyurls = true

# GitHub Pages project site: base URL 含子路径，资源需相对根
relativeurls = false

copyright = '© Yuunagi'

# 渲染：raw HTML（solution/caption/表格）透传，数学分隔符原样
[markup]
[markup.goldmark.renderer]
  unsafe = true
[markup.goldmark.extensions]
  # 表格、删除线等已在默认；此处显式开启 typographer 关闭以避免引号被改写
  typographer = false
[markup.tableOfContents]
  startLevel = 2
  endLevel = 4
  ordered = false
[markup.highlight]
  style = 'github'
  lineNos = false
  noClasses = false

# 输出：首页 RSS，其余只要 HTML
[outputs]
  home = ['html', 'rss']

# 分类法：标签 + 分类
[taxonomies]
  tag = 'tags'
  category = 'categories'

# 语言：单语言站（中文），内容放在 content/ 而非 content.zh/
[languages.zh]
  label = '中文'
  locale = 'zh-CN'
  weight = 1

# 站点参数（Hugo Book）
[params]
  # 颜色主题：跟随系统
  BookTheme = 'auto'
  # 根 section：左侧菜单从 content/ 下所有顶级目录构建
  BookSection = '*'
  # 搜索
  BookSearch = true
  # 关闭评论（Disqus）
  BookComments = false
  # 日期格式（中文）
  BookDateFormat = '2006-01-02'
  # 仓库
  BookRepo = 'https://github.com/uynajgi/yuulibrary'
  # 便携链接：把 .md 链接自动解析为页面引用
  BookPortableLinks = 'warning'

# Hugo Book 顶部 / 菜单尾部链接
[[menu.after]]
  name = 'GitHub'
  url = 'https://github.com/uynajgi/yuulibrary'
  weight = 10
