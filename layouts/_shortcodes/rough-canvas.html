{{/*
  手绘风格画布容器。用 rough.js 在 Canvas 上画手绘线条/形状。
  用法：{{< rough-canvas width="600" height="400" id="my-sketch" >}}
  然后在后面的 <script> 中用 rough.canvas() 绑定。
  注：Canvas 元素尺寸用 width/height attr，CSS 控制显示尺寸。
*/}}
{{ $width := .Get "width" | default "600" }}
{{ $height := .Get "height" | default "400" }}
{{ $id := .Get "id" | default (printf "rough-%s" (now.UnixNano | string)) }}
<div class="rough-container">
  <canvas id="{{ $id }}" width="{{ $width }}" height="{{ $height }}"></canvas>
</div>
