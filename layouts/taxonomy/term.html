{{/* 标签详情页：列出该标签下的所有内容 */}}
{{ define "main" }}
<article class="markdown book-article post">
  <h1>{{ partial "docs/title" . }}</h1>

  {{ range .Pages.ByDate.Reverse }}
    <a href="{{ .RelPermalink }}" class="book-row" style="display:flex;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit">
      <span style="flex:1">
        <strong>{{ .Title }}</strong>
        {{ with .Description }}<br><small style="opacity:0.7">{{ . }}</small>{{ end }}
      </span>
      {{ if ne (.Date.Year) 1 }}<span style="opacity:0.5;font-size:0.85em">{{ .Date.Format "2006-01-02" }}</span>{{ end }}
    </a>
  {{ end }}

  {{ if not .Pages }}
    <p style="opacity:0.5">暂无内容</p>
  {{ end }}
</article>
{{ end }}
