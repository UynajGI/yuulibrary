site_name: Yuunagi Library
site_description: 个人的数字图书馆
docs_dir: docs
theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式
  features:
    - navigation.expand
    - toc.follow
    - search.suggest
    - search.highlight

nav:
  - 首页: index.md
  - 量化金融面试实用指南:
    - 封面: quant-finance-interview/index.md
    - 前言: quant-finance-interview/preface.md
    - 符号说明: quant-finance-interview/notations.md
    - 第1章: quant-finance-interview/ch01.md
    - 第2章: quant-finance-interview/ch02.md
    - 第3章: quant-finance-interview/ch03.md
    - 第4章: quant-finance-interview/ch04.md
    - 第5章: quant-finance-interview/ch05.md
    - 第6章: quant-finance-interview/ch06.md
    - 第7章: quant-finance-interview/ch07.md
    - 索引: quant-finance-interview/index_term.md

use_directory_urls: false
markdown_extensions:
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
