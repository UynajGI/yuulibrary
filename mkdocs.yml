site_name: Yuunagi Library
site_description: 个人的数字图书馆
site_author: Yuunagi
site_url: https://uynajgi.github.io/yuulibrary/
docs_dir: docs

use_directory_urls: false

theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换浅色模式
  features:
    - announce.dismiss
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - navigation.prune
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      separator: '[\s​\-]'
  - tags
  - social:
      enabled: !ENV [CI, false]
  - privacy:
      enabled: !ENV [CI, false]

nav:
  - 首页: index.md
  - 书籍:
    - 机器学习:
      - 强化学习入门:
        - 封面: books/ml/rl-intro/index.md
        - 前言: books/ml/rl-intro/preface.md
        - 常用符号: books/ml/rl-intro/notations.md
        - 算法列表: books/ml/rl-intro/algorithms.md
        - 第1章 · 概述: books/ml/rl-intro/ch01.md
        - 第2章 · 从一个示例到马尔可夫决策过程: books/ml/rl-intro/ch02.md
        - 第3章 · 动态规划寻找最优策略: books/ml/rl-intro/ch03.md
        - 第4章 · 不基于模型的预测: books/ml/rl-intro/ch04.md
        - 第5章 · 无模型的控制: books/ml/rl-intro/ch05.md
        - 第6章 · 价值函数的近似表示: books/ml/rl-intro/ch06.md
        - 第7章 · 基于策略梯度的深度强化学习: books/ml/rl-intro/ch07.md
        - 第8章 · 基于模型的学习和规划: books/ml/rl-intro/ch08.md
        - 第9章 · 探索与利用: books/ml/rl-intro/ch09.md
        - 第10章 · Alpha Zero算法实战: books/ml/rl-intro/ch10.md
    - 金融经济:
