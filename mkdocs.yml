site_name: Yuunagi Library
site_description: 个人的数字图书馆
site_url: https://uynajgi.github.io/yuulibrary/
docs_dir: docs
theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换浅色模式
  features:
    - announce.dismiss
    - content.code.copy
    - content.code.annotate
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

nav:
  - 首页: index.md
  - 书籍:
    - 机器学习:
      - 强化学习入门:
        - 封面: books/ml/rl-intro/index.md
        - 前言: books/ml/rl-intro/preface.md
        - 常用符号: books/ml/rl-intro/notations.md
        - 算法列表: books/ml/rl-intro/algorithms.md
        - 第1章 · 概述: books/ml/rl-intro/ch01.md
        - 第2章 · 从一个示例到马尔可夫决策过程: books/ml/rl-intro/ch02.md
        - 第3章 · 动态规划寻找最优策略: books/ml/rl-intro/ch03.md
        - 第4章 · 不基于模型的预测: books/ml/rl-intro/ch04.md
        - 第5章 · 无模型的控制: books/ml/rl-intro/ch05.md
        - 第6章 · 价值函数的近似表示: books/ml/rl-intro/ch06.md
        - 第7章 · 基于策略梯度的深度强化学习: books/ml/rl-intro/ch07.md
        - 第8章 · 基于模型的学习和规划: books/ml/rl-intro/ch08.md
        - 第9章 · 探索与利用: books/ml/rl-intro/ch09.md
        - 第10章 · Alpha Zero算法实战: books/ml/rl-intro/ch10.md
    - 金融经济:
      - 量化金融面试实用指南:
        - 封面: books/finance/quant-finance-interview/index.md
        - 前言: books/finance/quant-finance-interview/preface.md
        - 符号说明: books/finance/quant-finance-interview/notations.md
        - 第1章 · 基本原则: books/finance/quant-finance-interview/ch01.md
        - 第2章 · 脑筋急转弯: books/finance/quant-finance-interview/ch02.md
        - 第3章 · 微积分与线性代数: books/finance/quant-finance-interview/ch03.md
        - 第4章 · 概率论: books/finance/quant-finance-interview/ch04.md
        - 第5章 · 随机过程与随机微积分: books/finance/quant-finance-interview/ch05.md
        - 第6章 · 金融: books/finance/quant-finance-interview/ch06.md
        - 第7章 · 算法与数值方法: books/finance/quant-finance-interview/ch07.md
        - 索引: books/finance/quant-finance-interview/index_term.md

use_directory_urls: false
markdown_extensions:
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
extra_css:
  - stylesheets/extra.css
  - https://cdn.jsdelivr.net/npm/pseudocode@latest/build/pseudocode.min.css
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml-full.js
  - https://cdn.jsdelivr.net/npm/pseudocode@latest/build/pseudocode.min.js
  - javascripts/pseudocode-render.js
