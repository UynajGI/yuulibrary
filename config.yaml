# Translation pipeline configuration
# Copy to config.yaml and edit. config.yaml is gitignored (user-specific).
# API keys stay in .env (DEEPSEEK_API_KEY etc.) — NOT here.

# ── LLM tiers ────────────────────────────────────────────────────────────
# Three quality/cost tiers. Without config.yaml, all collapse to the single
# model in .env (DEEPSEEK_MODEL), preserving legacy behavior.
llm:
  tiers:
    # Translation, structured analysis, title translation — the creative work.
    strong:
      model: "deepseek-v4-flash"
      base_url: "https://api.deepseek.com"
      max_tokens: 8192
    # Chapter-end review, consistency QA, backtranslation compare — judgment tasks.
    cheap:
      model: "deepseek-v4-flash"
      base_url: "https://api.deepseek.com"
      max_tokens: 4096
    # Whole-book prescan, chapter summaries, glossary extraction — mechanical.
    fast:
      model: "deepseek-v4-flash"
      base_url: "https://api.deepseek.com"
      max_tokens: 4096

# ── Pipeline toggles ─────────────────────────────────────────────────────
pipeline:
  review: true              # Chapter-end review (cheap tier)
  consistency_qa: true      # Cross-chapter consistency scan after translation
  backtranslate: false      # Backtranslation sampling (framework only, TODO)
  autofix_severe: true      # Auto-retranslate on severe issues

# ── Segmentation ─────────────────────────────────────────────────────────
segment:
  max_chars_per_batch: 4500   # Chunk size for translation batches
  max_chars_per_segment: 2000 # Split threshold for over-long paragraphs
