# markdownlint config — 适配 Hugo Goldmark + KaTeX + shortcodes
# 策略：只开渲染 bug 类规则，关掉纯风格类

default: false

# === 渲染 bug（开） ===
MD001: true    # 标题层级不跳级
MD005: true    # 列表缩进不一致
MD018: true    # 标题后缺空格
MD019: true    # 标题后多余空格
MD037: true    # 强调符内空格（** bold** 会被错误解析）
MD038: true    # 代码块围栏内空格
MD039: true    # 链接文本内空格
MD042: true    # 空链接
MD047: true    # 文件末尾缺空行（POSIX）

# === 链接/引用完整性（开） ===
MD034: true    # 裸 URL（应加 <> 或 [text](url)）
MD051: true    # 链接片段指向不存在的锚点（需 Hugo build 后验证，暂不强制）

# === 内容问题（开） ===
MD036: false   # **Author** 粗体副标题 — Hugo 论文标准格式
MD045: false   # 图片缺 alt — 我们用 {{< caption >}} 替代

# === Hugo 架构（关，不可修复） ===
MD025: false   # 多 H1 — 论文标准 # 英文 + ## 中文
MD033: false   # 行内 HTML — shortcode {{< callout >}}
MD041: false   # 首行非 H1 — YAML front matter

# === KaTeX / 数学（关，不可修复） ===
MD013: false   # 行长度 — 公式天然超长
MD049: false   # _ 强调 — LaTeX 下划线（x_i）
MD056: false   # 表格列数 — |e⟩ 被误判为列分隔
